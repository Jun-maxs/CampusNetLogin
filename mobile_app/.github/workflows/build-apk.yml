name: Build Campus Net APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 手动触发

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --fix-broken || true
          sudo apt-get install -y -qq \
            build-essential git python3-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev \
            autoconf automake libtool libltdl-dev pkg-config cmake \
            libffi-dev libssl-dev zip unzip wget \
            zlib1g-dev lzma liblzma-dev

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==3.0.11

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-v4-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v4-${{ runner.os }}-

      - name: Setup Android SDK
        run: |
          # 创建 SDK 目录
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR"
          
          # 下载最新 cmdline-tools
          CMDTOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          wget -q "$CMDTOOLS_URL" -O /tmp/cmdline-tools.zip
          mkdir -p "$SDK_DIR/cmdline-tools"
          unzip -q -o /tmp/cmdline-tools.zip -d "$SDK_DIR/cmdline-tools/"
          mv "$SDK_DIR/cmdline-tools/cmdline-tools" "$SDK_DIR/cmdline-tools/latest" 2>/dev/null || true
          
          # 设置 sdkmanager 路径
          SDKMANAGER="$SDK_DIR/cmdline-tools/latest/bin/sdkmanager"
          chmod +x "$SDKMANAGER"
          
          # 接受 licenses
          yes | "$SDKMANAGER" --licenses 2>/dev/null || true
          
          # 安装必要组件
          yes | "$SDKMANAGER" "platform-tools" "platforms;android-33" "build-tools;33.0.2" 2>/dev/null || true
          
          # 创建 tools 兼容链接 (buildozer 旧版需要)
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/avdmanager" "$SDK_DIR/tools/bin/avdmanager"
          
          echo "✅ Android SDK setup complete"
          ls -la "$SDK_DIR/"
          ls -la "$SDK_DIR/build-tools/" 2>/dev/null || echo "build-tools not found"

      - name: Build APK
        run: |
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          yes | buildozer android debug 2>&1 | tee build.log | tail -80

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CampusNet-APK
          path: bin/*.apk
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
